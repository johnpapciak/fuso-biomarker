paths:
  raw_dir: data/raw
  subsampled_dir: data/subsampled
  qc_dir: data/qc
  qc_reports_dir: data/qc/reports
  kraken_dir: data/kraken
  features_dir: data/features
  reports_dir: reports
  cleaned_metadata: metadata/cleaned_metadata.csv

tools:
  prefetch_path: prefetch
  fasterq_dump_path: fasterq-dump
  fastp_path: fastp
  kraken2_path: kraken2
  bracken_path: bracken
  seqtk_path: seqtk

kraken_db: kraken_db_full
subsample_fraction: 0.1
target_reads: null
threads: 1
kraken_confidence: 0.0
kraken_memory_mapping: true
pseudocount: 1e-6
presence_absence_threshold: 1e-4

panel_taxa:
# Cancer-associated (5)
- Fusobacterium nucleatum
- Bacteroides fragilis
- Escherichia coli
- Parvimonas micra
- Peptostreptococcus anaerobius

# Healthy-associated (5)
- Faecalibacterium prausnitzii
- Agathobacter rectalis
- Anaerostipes hadrus
- Bifidobacterium longum
- Roseburia intestinalis

bracken_read_length: 150
bracken_level: S
bracken_threshold: 1